<header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">
          <img
            src="/assets/images/Logo.png"
            alt="TridentWear Logo"
            class="brand-logo"
            width="40"
            height="40"
            decoding="async"
          />
          <span class="brand-name"
            ><span class="brand-trident">Trident</span
            ><span class="brand-wear">Wear</span></span
          >
        </a>
        <button
          class="mobile-toggle"
          type="button"
          data-mobile-toggle
          aria-label="Open navigation"
        >
          <span class="mobile-toggle-line"></span>
          <span class="mobile-toggle-line"></span>
          <span class="mobile-toggle-line"></span>
        </button>
        <nav class="site-nav" data-mobile-nav>
          <a class="nav-link" href="/" data-nav-link="home">Home</a>
          <a class="nav-link" href="/products" data-nav-link="products"
            >Products</a
          >
          <a class="nav-link" href="/about" data-nav-link="about">About</a>
          <a class="nav-link" href="/contact" data-nav-link="contact"
            >Contact</a
          >
        </nav>
        <div class="search-wrapper" data-search-wrapper>
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            class="search-input"
            type="text"
            placeholder="Search streetwear..."
            data-search-input
          />
          <div class="search-results" data-search-results hidden></div>
        </div>
        <div class="header-tools">
          <a class="utility-pill" href="/wishlist" title="Wishlist"
            ><i class="fa-regular fa-heart"></i
          ></a>
          <a class="utility-pill cart-pill" href="/cart" title="Cart"
            ><i class="fa-sharp fa-solid fa-cart-shopping"></i
            ><span class="cart-badge" data-cart-count>0</span></a
          >
          <a
            class="utility-pill"
            href="/login"
            data-login-link
            title="Profile"
            ><i class="fa-regular fa-user"></i
          ></a>
        </div>
      </div>
    </header>
