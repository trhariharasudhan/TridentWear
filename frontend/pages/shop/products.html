<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shop all premium T-shirts at TridentWear. Browse crew neck, oversized, polo, graphic tees and more — made in India."/>
    <link rel="canonical" href="/products" />
    <meta property="og:title" content="Shop All | TridentWear" />
    <meta property="og:description" content="Shop premium heavyweight T-shirts, oversized fits, polos, and everyday essentials from TridentWear." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/images/hero-banner.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Shop All | TridentWear</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260430-v3" />
    <link rel="icon" type="image/png" href="/assets/images/Logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  </head>
  <body data-page="products">

    <!-- ─── HEADER ─── -->
        {{ component:header }}

    <main>
      <!-- ─── PAGE HERO ─── -->
<section class="page-hero-combined" style="position: sticky; top: 3.6rem; z-index: 30; background: var(--white); border-bottom: 1px solid #e9ecef;">
  <div class="container">

    <!-- TOP CONTENT -->
    <div class="page-hero-panel" style="padding-bottom: 0.5rem;">
      
      <!-- Breadcrumb -->
      <nav aria-label="Breadcrumb" style="margin-bottom: 0.4rem; font-size: 0.82rem; color: var(--gray);">
        <a href="/" style="color: var(--gray);">Home</a>
        <span style="margin: 0 0.4rem;">/</span>
      </nav>

      <!-- Title -->
      <h1 class="page-title" data-active-category-label-h1>
        All T-Shirts
      </h1>

      <!-- Description -->
      <p class="page-copy">
        Premium heavyweight cotton tees made in India —
        <span data-product-count>0</span> styles available.
      </p>

    </div>

    <!-- FILTER BAR — T-Shirt fits only -->
    <div data-category-scroll
         style="display: flex; gap: 0.5rem; overflow-x: auto; padding: 0.5rem 0 0.6rem; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;">

      <button class="filter-chip is-active" type="button" data-main-category="all">All</button>
      <button class="filter-chip" type="button" data-main-category="tshirt">T-Shirts</button>

    </div>

    <div class="shop-control-bar">
      <div class="shop-search-wrap">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        <input class="shop-search-input" type="search" placeholder="Search drops, fits, fabric" data-shop-search autocomplete="off" />
      </div>
      <button class="btn btn-outline shop-filter-toggle" type="button" data-filter-drawer-toggle>
        <i class="fa-solid fa-sliders" aria-hidden="true"></i> Filters
      </button>
      <label class="shop-sort-wrap">
        <span>Sort</span>
        <select class="sort-select" data-shop-sort>
          <option value="newest">Newest</option>
          <option value="popular">Popular</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </label>
    </div>

    <div class="shop-filter-drawer" data-filter-drawer>
      <div class="shop-filter-panel">
        <div class="shop-filter-head">
          <strong>Refine The Drop</strong>
          <button type="button" data-filter-drawer-close aria-label="Close filters"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="shop-filter-group">
          <span>Fit</span>
          <label><input type="checkbox" value="regular-fit" data-filter-fit> Regular</label>
          <label><input type="checkbox" value="oversized-fit" data-filter-fit> Oversized</label>
          <label><input type="checkbox" value="drop-shoulder" data-filter-fit> Drop Shoulder</label>
        </div>
        <div class="shop-filter-group">
          <span>Size</span>
          <div class="shop-size-grid">
            <label><input type="checkbox" value="S" data-filter-size><span>S</span></label>
            <label><input type="checkbox" value="M" data-filter-size><span>M</span></label>
            <label><input type="checkbox" value="L" data-filter-size><span>L</span></label>
            <label><input type="checkbox" value="XL" data-filter-size><span>XL</span></label>
            <label><input type="checkbox" value="XXL" data-filter-size><span>XXL</span></label>
          </div>
        </div>
        <button class="btn btn-primary btn-full" type="button" data-filter-drawer-close>Apply Filters</button>
      </div>
    </div>




  </div>
</section>

      <!-- ─── PRODUCT GRID ─── -->
      <section class="section-tight">
        <div class="container">
          <div class="product-grid" data-products-grid></div>
        </div>
      </section>
    </main>

    {{ component:footer }}


    <button class="back-to-top" type="button" data-back-to-top aria-label="Back to top">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" >
        <polyline points="18 15 12 9 6 15" />
      </svg>
    </button>

    <!-- ─── BOTTOM NAV (mobile) ─── -->
    <nav class="bottom-nav">
      <a href="/" class="bottom-nav-item" data-nav="home">
        <span class="bottom-nav-icon"><i class="fa-solid fa-house"></i></span>
        <span class="bottom-nav-label">Home</span>
      </a>
      <a href="/products" class="bottom-nav-item is-active" data-nav="shop">
        <span class="bottom-nav-icon"><i class="fa-solid fa-bag-shopping"></i></span>
        <span class="bottom-nav-label">Shop</span>
      </a>
      <a href="/cart" class="bottom-nav-item" data-nav="cart">
        <span class="bottom-nav-icon"><i class="fa-solid fa-cart-shopping"></i></span>
        <span class="bottom-nav-label">Cart</span>
      </a>
      <a href="/wishlist" class="bottom-nav-item" data-nav="wishlist">
        <span class="bottom-nav-icon"><i class="fa-solid fa-heart"></i></span>
        <span class="bottom-nav-label">Wishlist</span>
      </a>
    </nav>

    <script type="module" src="/assets/js/pages/products.js?v=20260430-v3"></script>
  </body>
</html>
