<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Chat | TridentWear</title>
    <meta name="description" content="Chat with TridentWear support for help with orders, products, returns, and shipping inquiries." />
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260430-v3" />
    <link rel="icon" type="image/png" href="/assets/images/Logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body data-page="chat">
    {{ component:header }}

    <main class="section">
      <div class="container">
        <div class="chat-shell">
          <div class="chat-header">
            <a href="/contact" class="btn btn-outline" style="padding:0.4rem 0.8rem;border:none;" aria-label="Go Back">
              <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="chat-title">Trident Support</h1>
          </div>
          <div class="chat-messages" id="chat-messages">
            <!-- Messages will be rendered here by chat.js -->
            <div class="empty-state" style="margin: auto; border: none; opacity: 0.7;">
              <i class="fa-regular fa-comments empty-state-icon"></i>
              <span class="empty-copy">Start a conversation with our support team.</span>
            </div>
          </div>
          <form class="chat-input-area" id="chat-form">
            <input type="text" class="field" id="chat-input" placeholder="Type a message..." required autocomplete="off" />
            <button class="chat-send-btn" type="submit" aria-label="Send Message">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </form>
        </div>
      </div>
    </main>

    {{ component:footer }}
    <script type="module" src="/assets/js/pages/chat.js?v=20260430-v3"></script>
  </body>
</html>
