<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Chat | TridentWear</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=20260430-v3" />
    <link rel="icon" type="image/png" href="/assets/images/Logo.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  </head>
  <body data-page="admin-chat">
    {{ component:header }}

    <main class="section-tight" style="background: #f8f9fa;">
      <div class="container">
        
        <div class="section-header" style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <span class="eyebrow">Dashboard</span>
            <h1 class="section-title">Support Inbox</h1>
          </div>
          <a href="/admin" class="btn btn-outline">Back to Admin</a>
        </div>

        <div class="admin-chat-grid">
          <!-- Sidebar: Threads -->
          <div class="admin-chat-sidebar" id="admin-chat-sidebar">
            <div style="padding: 2rem; text-align: center; color: var(--gray);">
              <i class="fa-solid fa-spinner fa-spin"></i> Loading...
            </div>
          </div>

          <!-- Main: Active Chat -->
          <div class="chat-shell" style="height: 100%; border-radius: 0; border: none; box-shadow: none;" id="admin-chat-main">
            <div class="empty-state" style="margin: auto; border: none;">
              <i class="fa-regular fa-comments empty-state-icon"></i>
              <span class="empty-copy">Select a conversation to view and reply.</span>
            </div>
          </div>
        </div>

      </div>
    </main>

    {{ component:footer }}
    <script type="module" src="/assets/js/pages/admin-chat.js?v=20260430-v3"></script>
  </body>
</html>
